<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hallowed Drafts — Corpus Correction Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface-2: #242424;
  --surface-3: #2e2e2e;
  --border: #333;
  --border-focus: #6366f1;
  --text: #e8e8e8;
  --text-dim: #888;
  --text-muted: #555;
  --accent: #818cf8;
  --accent-dim: #4f46e5;
  --green: #34d399;
  --green-dim: #065f46;
  --red: #f87171;
  --red-dim: #7f1d1d;
  --amber: #fbbf24;
  --amber-dim: #78350f;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

.app { display: flex; height: 100vh; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  width: 320px;
  min-width: 320px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  padding: 20px 16px 12px;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h1 {
  font-family: 'Crimson Pro', serif;
  font-weight: 300;
  font-size: 18px;
  letter-spacing: 0.05em;
  color: var(--accent);
  text-transform: uppercase;
}
.sidebar-header .subtitle {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}

.stats-bar {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.stat {
  background: var(--surface-2);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 11px;
  color: var(--text-dim);
  flex: 1;
  min-width: 80px;
  text-align: center;
}
.stat strong {
  display: block;
  font-size: 16px;
  color: var(--text);
  font-weight: 600;
}
.stat.good strong { color: var(--green); }
.stat.warn strong { color: var(--amber); }

.search-box {
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
}
.search-box input {
  width: 100%;
  padding: 8px 12px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  outline: none;
}
.search-box input:focus { border-color: var(--border-focus); }
.search-box input::placeholder { color: var(--text-muted); }

.book-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}
.book-item {
  display: flex;
  align-items: center;
  padding: 8px 16px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.15s;
}
.book-item:hover { background: var(--surface-2); }
.book-item.active {
  background: var(--surface-2);
  border-left-color: var(--accent);
}
.book-item .name {
  flex: 1;
  font-size: 13px;
  font-weight: 500;
}
.book-item .count {
  font-size: 11px;
  color: var(--text-dim);
  background: var(--surface-3);
  padding: 2px 8px;
  border-radius: 10px;
}
.book-item .chapters {
  font-size: 10px;
  color: var(--text-muted);
  margin-left: 6px;
}

.section-label {
  padding: 10px 16px 4px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  font-weight: 600;
}

/* ── Main Content ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.main-header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  background: var(--surface);
}
.main-header h2 {
  font-family: 'Crimson Pro', serif;
  font-weight: 400;
  font-size: 22px;
  flex: 1;
}
.chapter-nav {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  max-width: 60%;
}
.ch-btn {
  width: 30px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-dim);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
}
.ch-btn:hover { border-color: var(--accent); color: var(--text); }
.ch-btn.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: white;
  font-weight: 600;
}
.ch-btn.has-gap {
  background: var(--amber-dim);
  border-color: var(--amber);
  color: var(--amber);
}

.content-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

.chapter-info {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  align-items: center;
}
.chapter-info .badge {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 12px;
  font-weight: 500;
}
.badge.count-badge {
  background: var(--accent-dim);
  color: var(--accent);
}

.add-btn {
  margin-left: auto;
  padding: 8px 16px;
  background: var(--green-dim);
  color: var(--green);
  border: 1px solid rgba(52, 211, 153, 0.3);
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
.add-btn:hover { background: rgba(52, 211, 153, 0.2); }

/* ── Principle Card ── */
.principle-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 12px;
  transition: border-color 0.15s;
}
.principle-card:hover { border-color: var(--border-focus); }
.principle-card.editing { border-color: var(--accent); }
.principle-card.new-card { border-color: var(--green); border-style: dashed; }

.pc-header {
  display: flex;
  align-items: flex-start;
  padding: 14px 16px 8px;
  gap: 12px;
}
.pc-num {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface-3);
  border-radius: 4px;
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 600;
  flex-shrink: 0;
  margin-top: 2px;
}
.pc-title {
  flex: 1;
  font-family: 'Crimson Pro', serif;
  font-size: 16px;
  font-weight: 600;
  line-height: 1.3;
}
.pc-verse {
  font-size: 11px;
  color: var(--accent);
  background: rgba(99, 102, 241, 0.1);
  padding: 2px 8px;
  border-radius: 4px;
  flex-shrink: 0;
}
.pc-actions {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}
.pc-actions button {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 12px;
  transition: all 0.15s;
}
.pc-actions button:hover { border-color: var(--text-dim); color: var(--text); }
.pc-actions button.delete:hover { border-color: var(--red); color: var(--red); }

.pc-body {
  padding: 0 16px 14px;
  padding-left: 52px;
}
.pc-body .label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-top: 8px;
  margin-bottom: 2px;
}
.pc-body p {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.5;
}
.pc-body .god-shot {
  font-family: 'Crimson Pro', serif;
  font-style: italic;
  color: var(--text-dim);
  font-size: 13px;
  border-left: 2px solid var(--accent-dim);
  padding-left: 12px;
  margin-top: 8px;
}

/* ── Edit Form ── */
.edit-form {
  padding: 16px;
  background: var(--surface-2);
  border-top: 1px solid var(--border);
}
.form-row {
  display: flex;
  gap: 12px;
  margin-bottom: 10px;
}
.form-group {
  flex: 1;
}
.form-group label {
  display: block;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 4px;
}
.form-group input,
.form-group textarea {
  width: 100%;
  padding: 8px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  outline: none;
}
.form-group input:focus,
.form-group textarea:focus { border-color: var(--border-focus); }
.form-group textarea { resize: vertical; min-height: 60px; }

.form-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 8px;
}
.btn {
  padding: 7px 16px;
  border-radius: 5px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  border: 1px solid transparent;
  transition: all 0.15s;
}
.btn-save { background: var(--accent-dim); color: white; border-color: var(--accent); }
.btn-save:hover { background: var(--accent); }
.btn-cancel { background: transparent; color: var(--text-dim); border-color: var(--border); }
.btn-cancel:hover { color: var(--text); }
.btn-danger { background: var(--red-dim); color: var(--red); border-color: rgba(248,113,113,0.3); }
.btn-danger:hover { background: rgba(248,113,113,0.2); }

/* ── Welcome / Empty State ── */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  text-align: center;
  color: var(--text-dim);
}
.welcome h2 {
  font-family: 'Crimson Pro', serif;
  font-weight: 300;
  font-size: 28px;
  letter-spacing: 0.04em;
  color: var(--text);
  margin-bottom: 8px;
}
.welcome p {
  font-size: 14px;
  max-width: 400px;
  margin-bottom: 20px;
}

/* ── Toolbar ── */
.toolbar {
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 8px;
  background: var(--surface);
}
.toolbar .btn { font-size: 11px; padding: 5px 12px; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ── File Input ── */
.file-input-area {
  border: 2px dashed var(--border);
  border-radius: 8px;
  padding: 32px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
}
.file-input-area:hover { border-color: var(--accent); }
.file-input-area input { display: none; }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  padding: 12px 20px;
  background: var(--green-dim);
  color: var(--green);
  border: 1px solid rgba(52,211,153,0.3);
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  z-index: 100;
  animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.5s forwards;
}
@keyframes slideIn { from { transform: translateY(20px); opacity: 0; } }
@keyframes fadeOut { to { transform: translateY(-10px); opacity: 0; } }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Hallowed Drafts</h1>
      <div class="subtitle">Corpus Correction Tool</div>
    </div>
    <div class="stats-bar" id="stats-bar"></div>
    <div class="search-box">
      <input type="text" placeholder="Search books or principles..." id="search" autocomplete="off">
    </div>
    <div class="book-list" id="book-list"></div>
  </div>
  
  <div class="main">
    <div class="main-header" id="main-header">
      <h2 id="book-title">Select a book</h2>
      <div class="chapter-nav" id="chapter-nav"></div>
    </div>
    <div class="toolbar" id="toolbar" style="display:none">
      <button class="btn btn-save" onclick="exportCorpus()">⬇ Export corpus.json</button>
      <button class="btn btn-cancel" onclick="importCorpus()">⬆ Import corpus.json</button>
      <input type="file" id="import-file" accept=".json" style="display:none">
    </div>
    <div class="content-area" id="content-area">
      <div class="welcome">
        <h2>Corpus Correction Tool</h2>
        <p>Load your corpus.json to begin reviewing and correcting principles. Select a book from the sidebar to browse chapters.</p>
        <div class="file-input-area" onclick="document.getElementById('load-file').click()">
          <p style="font-size:24px;margin-bottom:8px">📖</p>
          <p>Click to load corpus.json</p>
          <input type="file" id="load-file" accept=".json">
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let corpus = null;
let currentBook = null;
let currentChapter = null;
let editingIdx = null;
let dirty = false;

const CANONICAL = [
  "Genesis","Exodus","Leviticus","Numbers","Deuteronomy",
  "Joshua","Judges","Ruth","1 Samuel","2 Samuel","1 Kings","2 Kings",
  "1 Chronicles","2 Chronicles","Ezra","Nehemiah","Esther",
  "Job","Psalms","Proverbs","Ecclesiastes","Song of Songs",
  "Isaiah","Jeremiah","Lamentations","Ezekiel","Daniel",
  "Hosea","Joel","Amos","Obadiah","Jonah","Micah","Nahum","Habakkuk","Zephaniah",
  "Haggai","Zechariah","Malachi",
  "Matthew","Mark","Luke","John","Acts",
  "Romans","1 Corinthians","2 Corinthians","Galatians","Ephesians",
  "Philippians","Colossians","1 Thessalonians","2 Thessalonians",
  "1 Timothy","2 Timothy","Titus","Philemon",
  "Hebrews","James","1 Peter","2 Peter","1 John","2 John","3 John","Jude","Revelation"
];

const CHAPTER_COUNTS = {
  "Genesis":50,"Exodus":40,"Leviticus":27,"Numbers":36,"Deuteronomy":34,
  "Joshua":24,"Judges":21,"Ruth":4,"1 Samuel":31,"2 Samuel":24,"1 Kings":22,"2 Kings":25,
  "1 Chronicles":29,"2 Chronicles":36,"Ezra":10,"Nehemiah":13,"Esther":10,
  "Job":42,"Psalms":150,"Proverbs":31,"Ecclesiastes":12,"Song of Songs":8,
  "Isaiah":66,"Jeremiah":52,"Lamentations":5,"Ezekiel":48,"Daniel":12,
  "Hosea":14,"Joel":3,"Amos":9,"Obadiah":1,"Jonah":4,"Micah":7,"Nahum":3,"Habakkuk":3,"Zephaniah":3,
  "Haggai":2,"Zechariah":14,"Malachi":4,
  "Matthew":28,"Mark":16,"Luke":24,"John":21,"Acts":28,
  "Romans":16,"1 Corinthians":16,"2 Corinthians":13,"Galatians":6,"Ephesians":6,
  "Philippians":4,"Colossians":4,"1 Thessalonians":5,"2 Thessalonians":3,
  "1 Timothy":6,"2 Timothy":4,"Titus":3,"Philemon":1,
  "Hebrews":13,"James":5,"1 Peter":5,"2 Peter":3,"1 John":5,"2 John":1,"3 John":1,"Jude":1,"Revelation":22
};

document.getElementById('load-file').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const text = await file.text();
  try {
    corpus = JSON.parse(text);
    if (!corpus.books) {
      // Handle full index format vs minified
      if (corpus.principles) {
        corpus = convertFullToMinified(corpus);
      }
    }
    renderSidebar();
    document.getElementById('toolbar').style.display = 'flex';
    showToast('Corpus loaded: ' + countTotal() + ' principles');
  } catch(err) {
    alert('Invalid JSON file: ' + err.message);
  }
});

document.getElementById('import-file').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const text = await file.text();
  try {
    const imported = JSON.parse(text);
    if (imported.books) corpus = imported;
    else if (imported.principles) corpus = convertFullToMinified(imported);
    renderSidebar();
    if (currentBook) selectBook(currentBook);
    showToast('Imported: ' + countTotal() + ' principles');
  } catch(err) {
    alert('Import failed: ' + err.message);
  }
});

function convertFullToMinified(full) {
  const books = {};
  for (const p of full.principles) {
    if (!books[p.book]) books[p.book] = {};
    const ch = String(p.chapter);
    if (!books[p.book][ch]) books[p.book][ch] = [];
    books[p.book][ch].push({
      t: p.title, v: p.verse_ref || '', p: p.principle || '',
      a: p.application || '', g: p.god_shot || ''
    });
  }
  return { version: full.version || "3.0", total: full.total_principles || countPrinciples(books), books };
}

function countPrinciples(books) {
  let n = 0;
  for (const b in books) for (const ch in books[b]) n += books[b][ch].length;
  return n;
}

function countTotal() {
  if (!corpus || !corpus.books) return 0;
  return countPrinciples(corpus.books);
}

function renderSidebar() {
  const total = countTotal();
  const bookCount = Object.keys(corpus.books).length;
  const coveredCh = Object.values(corpus.books).reduce((s, chs) => s + Object.keys(chs).length, 0);
  
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat good"><strong>${total.toLocaleString()}</strong>principles</div>
    <div class="stat"><strong>${bookCount}</strong>books</div>
    <div class="stat"><strong>${coveredCh}</strong>chapters</div>
    <div class="stat ${total >= 5956 ? 'good' : 'warn'}"><strong>${(total/5956*100).toFixed(1)}%</strong>of target</div>
  `;
  
  renderBookList();
}

function renderBookList(filter = '') {
  const list = document.getElementById('book-list');
  let html = '';
  
  const groups = [
    { label: 'Pentateuch', books: CANONICAL.slice(0, 5) },
    { label: 'Historical', books: CANONICAL.slice(5, 17) },
    { label: 'Poetry & Wisdom', books: CANONICAL.slice(17, 22) },
    { label: 'Major Prophets', books: CANONICAL.slice(22, 27) },
    { label: 'Minor Prophets', books: CANONICAL.slice(27, 39) },
    { label: 'Gospels & Acts', books: CANONICAL.slice(39, 44) },
    { label: 'Pauline Epistles', books: CANONICAL.slice(44, 57) },
    { label: 'General Epistles & Revelation', books: CANONICAL.slice(57) },
  ];
  
  for (const g of groups) {
    const books = g.books.filter(b => 
      !filter || b.toLowerCase().includes(filter.toLowerCase())
    );
    if (books.length === 0) continue;
    
    html += `<div class="section-label">${g.label}</div>`;
    for (const b of books) {
      const data = corpus.books[b] || {};
      const count = Object.values(data).reduce((s, arr) => s + arr.length, 0);
      const chs = Object.keys(data).length;
      const totalChs = CHAPTER_COUNTS[b] || 0;
      const active = b === currentBook ? 'active' : '';
      html += `<div class="book-item ${active}" onclick="selectBook('${b}')">
        <span class="name">${b}</span>
        <span class="count">${count}</span>
        <span class="chapters">${chs}/${totalChs} ch</span>
      </div>`;
    }
  }
  list.innerHTML = html;
}

document.getElementById('search').addEventListener('input', (e) => {
  renderBookList(e.target.value);
});

function selectBook(book) {
  currentBook = book;
  currentChapter = null;
  editingIdx = null;
  renderBookList(document.getElementById('search').value);
  
  document.getElementById('book-title').textContent = book;
  
  const totalChs = CHAPTER_COUNTS[book] || 0;
  const data = corpus.books[book] || {};
  
  let navHtml = '';
  for (let ch = 1; ch <= totalChs; ch++) {
    const principles = data[String(ch)] || [];
    const hasGap = principles.length === 0;
    const cls = hasGap ? 'has-gap' : '';
    navHtml += `<div class="ch-btn ${cls}" onclick="selectChapter(${ch})" id="ch-btn-${ch}">${ch}</div>`;
  }
  document.getElementById('chapter-nav').innerHTML = navHtml;
  
  // Show book summary
  const count = Object.values(data).reduce((s, arr) => s + arr.length, 0);
  const coveredChs = Object.keys(data).length;
  const missingChs = [];
  for (let ch = 1; ch <= totalChs; ch++) {
    if (!data[String(ch)] || data[String(ch)].length === 0) missingChs.push(ch);
  }
  
  let html = `<div style="padding:20px 0">
    <div style="display:flex;gap:12px;margin-bottom:16px">
      <div class="stat"><strong>${count}</strong>principles</div>
      <div class="stat"><strong>${coveredChs}/${totalChs}</strong>chapters</div>
      <div class="stat ${missingChs.length === 0 ? 'good' : 'warn'}"><strong>${missingChs.length}</strong>gaps</div>
    </div>`;
  
  if (missingChs.length > 0) {
    html += `<p style="font-size:13px;color:var(--amber)">Missing chapters: ${missingChs.join(', ')}</p>`;
  }
  html += `<p style="font-size:13px;color:var(--text-dim);margin-top:8px">Click a chapter number above to review its principles.</p>`;
  html += `</div>`;
  
  document.getElementById('content-area').innerHTML = html;
}

function selectChapter(ch) {
  currentChapter = ch;
  editingIdx = null;
  
  // Update chapter nav active state
  document.querySelectorAll('.ch-btn').forEach(el => el.classList.remove('active'));
  const btn = document.getElementById('ch-btn-' + ch);
  if (btn) btn.classList.add('active');
  
  renderChapter();
}

function renderChapter() {
  if (!currentBook || !currentChapter) return;
  
  const data = corpus.books[currentBook] || {};
  const principles = data[String(currentChapter)] || [];
  
  let html = `<div class="chapter-info">
    <span style="font-family:'Crimson Pro',serif;font-size:18px">${currentBook} ${currentChapter}</span>
    <span class="badge count-badge">${principles.length} principle${principles.length !== 1 ? 's' : ''}</span>
    <button class="add-btn" onclick="addPrinciple()">+ Add Principle</button>
  </div>`;
  
  for (let i = 0; i < principles.length; i++) {
    const p = principles[i];
    const isEditing = editingIdx === i;
    
    html += `<div class="principle-card ${isEditing ? 'editing' : ''}" id="pc-${i}">
      <div class="pc-header">
        <div class="pc-num">${i + 1}</div>
        <div class="pc-title">${esc(p.t)}</div>
        ${p.v ? `<div class="pc-verse">${esc(p.v)}</div>` : ''}
        <div class="pc-actions">
          <button onclick="startEdit(${i})" title="Edit">✎</button>
          <button class="delete" onclick="deletePrinciple(${i})" title="Delete">✕</button>
        </div>
      </div>`;
    
    if (!isEditing) {
      html += `<div class="pc-body">`;
      if (p.p) {
        html += `<div class="label">Principle</div><p>${esc(truncate(p.p, 300))}</p>`;
      }
      if (p.a) {
        html += `<div class="label">Application</div><p>${esc(truncate(p.a, 300))}</p>`;
      }
      if (p.g && i === 0) {
        html += `<div class="label">God Shot</div><div class="god-shot">${esc(truncate(p.g, 300))}</div>`;
      }
      html += `</div>`;
    } else {
      html += `<div class="edit-form">
        <div class="form-row">
          <div class="form-group" style="flex:3">
            <label>Title</label>
            <input id="edit-title" value="${escAttr(p.t)}">
          </div>
          <div class="form-group" style="flex:1">
            <label>Verse Reference</label>
            <input id="edit-verse" value="${escAttr(p.v)}">
          </div>
        </div>
        <div class="form-group">
          <label>Principle</label>
          <textarea id="edit-principle" rows="3">${esc(p.p)}</textarea>
        </div>
        <div class="form-group">
          <label>Application</label>
          <textarea id="edit-application" rows="3">${esc(p.a)}</textarea>
        </div>
        <div class="form-group">
          <label>God Shot</label>
          <textarea id="edit-godshot" rows="2">${esc(p.g)}</textarea>
        </div>
        <div class="form-actions">
          <button class="btn btn-cancel" onclick="cancelEdit()">Cancel</button>
          <button class="btn btn-save" onclick="saveEdit(${i})">Save Changes</button>
        </div>
      </div>`;
    }
    
    html += `</div>`;
  }
  
  document.getElementById('content-area').innerHTML = html;
}

function startEdit(idx) {
  editingIdx = idx;
  renderChapter();
  document.getElementById('edit-title')?.focus();
}

function cancelEdit() {
  editingIdx = null;
  renderChapter();
}

function saveEdit(idx) {
  const ch = String(currentChapter);
  if (!corpus.books[currentBook]) corpus.books[currentBook] = {};
  if (!corpus.books[currentBook][ch]) corpus.books[currentBook][ch] = [];
  
  const p = corpus.books[currentBook][ch][idx];
  p.t = document.getElementById('edit-title').value.trim();
  p.v = document.getElementById('edit-verse').value.trim();
  p.p = document.getElementById('edit-principle').value.trim();
  p.a = document.getElementById('edit-application').value.trim();
  p.g = document.getElementById('edit-godshot').value.trim();
  
  editingIdx = null;
  dirty = true;
  renderChapter();
  renderSidebar();
  showToast('Principle updated');
}

function addPrinciple() {
  const ch = String(currentChapter);
  if (!corpus.books[currentBook]) corpus.books[currentBook] = {};
  if (!corpus.books[currentBook][ch]) corpus.books[currentBook][ch] = [];
  
  corpus.books[currentBook][ch].push({
    t: 'New Principle', v: '', p: '', a: '', g: ''
  });
  
  editingIdx = corpus.books[currentBook][ch].length - 1;
  dirty = true;
  renderChapter();
  renderSidebar();
  
  // Scroll to new card
  const card = document.getElementById('pc-' + editingIdx);
  if (card) card.scrollIntoView({ behavior: 'smooth' });
  
  setTimeout(() => document.getElementById('edit-title')?.select(), 100);
}

function deletePrinciple(idx) {
  if (!confirm('Delete this principle?')) return;
  
  const ch = String(currentChapter);
  corpus.books[currentBook][ch].splice(idx, 1);
  if (corpus.books[currentBook][ch].length === 0) {
    delete corpus.books[currentBook][ch];
  }
  
  editingIdx = null;
  dirty = true;
  renderChapter();
  renderSidebar();
  
  // Update chapter button state
  const btn = document.getElementById('ch-btn-' + currentChapter);
  if (btn) {
    const principles = (corpus.books[currentBook] || {})[ch] || [];
    btn.classList.toggle('has-gap', principles.length === 0);
  }
  
  showToast('Principle deleted');
}

function exportCorpus() {
  if (!corpus) return;
  corpus.total = countTotal();
  const blob = new Blob([JSON.stringify(corpus, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'corpus.json';
  a.click();
  URL.revokeObjectURL(url);
  dirty = false;
  showToast('Exported corpus.json');
}

function importCorpus() {
  document.getElementById('import-file').click();
}

// Helpers
function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return esc(s).replace(/"/g,'&quot;'); }
function truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '…' : (s || ''); }

function showToast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// Warn before leaving with unsaved changes
window.addEventListener('beforeunload', (e) => {
  if (dirty) {
    e.preventDefault();
    e.returnValue = '';
  }
});

// Auto-load if corpus.json is in the same directory
fetch('corpus.json').then(r => r.ok ? r.json() : null).then(data => {
  if (data) {
    if (data.books) corpus = data;
    else if (data.principles) corpus = convertFullToMinified(data);
    if (corpus) {
      renderSidebar();
      document.getElementById('toolbar').style.display = 'flex';
      document.getElementById('content-area').innerHTML = `
        <div class="welcome">
          <h2>Corpus Loaded</h2>
          <p>${countTotal().toLocaleString()} principles across ${Object.keys(corpus.books).length} books. Select a book from the sidebar to begin reviewing.</p>
        </div>`;
    }
  }
}).catch(() => {});
</script>

</html>
